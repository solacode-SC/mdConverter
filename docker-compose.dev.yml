version: '3.8'

services:
  backend:
    build: ./backend
    container_name: md_converter_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks:
      - md_network

  frontend:
    build: ./frontend
    container_name: md_converter_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    command: ["npm", "run", "dev"]
    networks:
      - md_network
    depends_on:
      - backend

networks:
  md_network:
    name: md_network
    driver: bridge
